name: CI

on: pull_request

jobs:
  tests:
    name: Flow CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.23.x"
      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - uses: actions/cache@v4
        with:
          path: ./imports
          key: flow-deps-${{ hashFiles('flow.json') }}
      - name: Install Flow CLI
        run: sh -ci "$(curl -fsSL https://raw.githubusercontent.com/onflow/flow-cli/master/install.sh)" -- v2.16.0
      - name: Flow CLI Version
        run: flow version
      - name: Update PATH and show Flow version
        run: |
          echo "/root/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          which flow || true
          flow version
      - name: Install dependencies
        run: flow deps install --skip-alias --skip-deployments
      - name: Run tests
        run: make ci
